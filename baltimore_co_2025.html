<html><head>
  <title>2025 Baltimore County government pay</title>

  <meta name="robots" content="noindex">
  <meta name="viewport" content="width=device-width" />

  <script
  src="https://code.jquery.com/jquery-3.7.1.min.js"
  integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
  crossorigin="anonymous"></script>

  <link href="https://cdn.datatables.net/v/dt/dt-2.2.2/r-3.0.4/datatables.min.css" rel="stylesheet" integrity="sha384-gmZ5jterufNKMboaPX/+AZbRRbDF+z379XQUHv6DYWg2o8yTKtN/tMySXHexqf8y" crossorigin="anonymous">
  <script src="https://cdn.datatables.net/v/dt/dt-2.2.2/r-3.0.4/datatables.min.js" integrity="sha384-340kE+RFFzUA/C9OCZW0VbqKLMOXLTO4/ZfWMEI/eBfwR1YuVsxZgZx/kobR4cbc" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://use.typekit.net/mlb5rgi.css">
  <style>
    body {
        font-family: "droid-sans", sans-serif;
        font-size: .91em;
    }
    #tbl25 {
        font-family: "droid-sans", sans-serif;
        font-size: .96em;
    }
    #dt-search-0 {
        font-size: 16px;
    }
  </style>
</head><body>
<script>

DataTable.ext.errMode = 'none';

$(document).ready(function() {

    new DataTable('#tbl25', {
        ajax: 'https://raw.githubusercontent.com/Baltimore-Sun/2025-baltimore-co-pay/main/rdrtbl.json',
        scrollX: true,
        order: [[3, 'desc']],
        pageLength: 20,
        responsive: true,
        lengthChange: false,
        layout: {
            topStart: 'search',
            topEnd: null,
            bottomStart: 'info',
            bottomEnd: 'paging'
        },
        columns: [
            { data: 'Name' },
            { data: 'Organization' },
            { data: 'Title' },
            { data: 'Gross pay',     orderSequence: ['desc', 'asc'], render: $.fn.dataTable.render.number(",", ".", 0, "$") },
            { data: 'Salary',        orderSequence: ['desc', 'asc'], render: $.fn.dataTable.render.number(",", ".", 0, "$") },
            { data: 'Overtime pay',  orderSequence: ['desc', 'asc'], render: $.fn.dataTable.render.number(",", ".", 0, "$") },
            { data: 'Overtime hours',orderSequence: ['desc', 'asc'], render: $.fn.dataTable.render.number(",", ".", 2) },
            { data: 'Callback, standby, or substitute pay', orderSequence: ['desc', 'asc'], render: $.fn.dataTable.render.number(",", ".", 0, "$") },
            {
                data: 'Hire date',
                render: function(data, type) {
                    if (!data) return '';
                    if (type === 'sort' || type === 'type') return data;
                    var parts = data.split('-');
                    if (parts.length !== 3) return data;
                    return parseInt(parts[1]) + '/' + parseInt(parts[2]) + '/' + parts[0];
                }
            },
            {
                data: 'Termination date',
                render: function(data, type) {
                    if (!data) return '';
                    if (type === 'sort' || type === 'type') return data;
                    var parts = data.split('-');
                    if (parts.length !== 3) return data;
                    return parseInt(parts[1]) + '/' + parseInt(parts[2]) + '/' + parts[0];
                }
            }
        ]
    });

});

</script>

<table id="tbl25" class="display" style="font-family: 'Droid Sans', sans-serif; font-size: .96em;">
    <thead>
        <tr>
            <th>Name</th>
            <th>Organization</th>
            <th>Title</th>
            <th>Gross pay</th>
            <th>Salary</th>
            <th>Overtime pay</th>
            <th>Overtime hours</th>
            <th>Callback, standby, or substitute pay</th>
            <th>Hire date</th>
            <th>Termination date</th>
        </tr>
    </thead>
</table>

</body>
</html>
